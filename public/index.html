<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TennisPro — Court Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main app mount point — all views are rendered here by app.js -->
  <div id="app"></div>

  <!-- Toast container — notification messages are appended here -->
  <div id="toast" aria-live="polite"></div>

  <!--
    Confirm modal — static in the DOM, shown/hidden via JS.
    Lives outside #app so it is never destroyed by re-renders.
  -->
  <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal">
      <p id="modal-title"></p>
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button id="modal-cancel"  class="btn btn-ghost">Cancel</button>
        <button id="modal-confirm" class="btn btn-primary">Confirm</button>
      </div>
    </div>
  </div>

  <!--
    Edit booking sheet — static in DOM, shown/hidden via JS.
    Slides up from bottom on mobile (sheet), centred card on desktop.
  -->
  <div id="edit-overlay">
    <div id="edit-modal">
      <div class="sheet-handle"></div>
      <div class="edit-header">
        <h3 id="edit-title">Edit Booking</h3>
        <button class="btn-icon" id="edit-close" aria-label="Close">✕</button>
      </div>

      <div class="edit-form">
        <div class="form-group">
          <label for="edit-date">Date</label>
          <input type="date" id="edit-date">
        </div>
        <div class="form-group">
          <label for="edit-court">Court</label>
          <select id="edit-court" class="form-select"></select>
        </div>
        <div class="form-group">
          <label for="edit-time">Time</label>
          <select id="edit-time" class="form-select"></select>
        </div>
      </div>

      <div class="edit-actions">
        <button id="edit-delete" class="btn btn-danger">Delete Booking</button>
        <div class="edit-actions-right">
          <button id="edit-cancel-btn" class="btn btn-ghost">Cancel</button>
          <button id="edit-save" class="btn btn-primary">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
